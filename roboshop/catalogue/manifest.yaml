apiVersion: v1
kind: Namespace
metadata:
 name: roboshop
---
apiVersion: v1
kind: ConfigMap
metadata:
 name: my-config
 namespace: roboshop
data:
 MONGO: "TRUE"
---
apiVersion: apps/v1
kind: Deployment
metadata: 
 name: catalogue
 namespace: roboshop
 labels: 
   app: catalogue
   project: roboshop
   tier: app
spec:
  replicas: 1
  selector:
   matchLabels:
    app: catalogue
    project: roboshop
    tier: app
  template:
   metadata:
    labels: 
      app: catalogue
      project: roboshop
      tier: app
   spec:
    containers: 
    - name: catalogue
      image: raghuramuludevops/catalogue:v1
      ports:
        - containerPort: 8080
      imagePullPolicy: Always
      envFrom:
       - configMapRef:
          name: my-config
---
apiVersion: v1
kind: Service
metadata: 
 name: catalogue
 namespace: roboshop
spec:
 selector:
  app: catalogue
  project: roboshop
  tier: db
 ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080