apiVersion: v1
kind: Namespace
metadata:
 name: roboshop
---
apiVersion: apps/v1
kind: Deployment
metadata: 
 name: mongodb
 namespace: roboshop
 labels:
  app: mongodb
  project: roboshop
  tier: db
spec:
 replicas: 1
 selector:
  matchLabels:
   app: mongodb
   project: roboshop
   tier: db
 template:
  metadata:
   labels:
    app: mongodb
    project: roboshop
    tier: db
  spec: 
   containers:
    - name: mongodb
      image: raghuramuludevops/mongodb:v1
      ports:
      - containerPort: 27017
      imagePullPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
   name: mongodb
   namespace: roboshop
spec:
    selector: 
      app: mongodb
      project: roboshop
      tier: db
    ports:
      - protocol: TCP
        port: 27017
        targetPort: 27017